name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'   # roz midnight UTC pe chalega
  workflow_dispatch:        # manual trigger bhi kar sakte ho

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity
          plugin_streak: yes
          plugin_streak_mode: github-streak

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/metrics.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats [auto]"
          git push
